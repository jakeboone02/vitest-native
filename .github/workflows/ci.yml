name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Lint, Format & Test
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Check formatting
        run: bun run format:check

      - name: Typecheck
        run: bun run typecheck

      - name: Build
        run: bun run build

      - name: Test
        run: bun run test

      - name: Native engine tests
        run: bun run test:native

      - name: Native engine tests (hot runtime)
        # The hot runtime rides @experimental Vitest internals (vitest/worker,
        # ThreadsPoolWorker, poolRunner) — the most churn-prone surface we depend
        # on, so gate it on every PR, not just the weekly matrix.
        run: bun run test:native:hot

      - name: Cross-check (mock ≡ real RN)
        run: bun run crosscheck

      - name: Test example app
        run: bun run test:example

      - name: Check package exports
        run: |
          cd packages/vitest-native
          npm pack --pack-destination ../../
          cd ../..
          # cjs-resolves-to-esm: the jest-compat runtime subpaths are intentionally
          # ESM-only (they depend on vitest, which is ESM-only); CJS consumers use
          # dynamic import. They are setup-file / Vite-alias targets, not typed imports.
          npx --yes @arethetypeswrong/cli vitest-native-*.tgz --ignore-rules no-resolution cjs-resolves-to-esm
